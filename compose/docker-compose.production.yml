# Production overrides — hardened, no dashboard, restart-always, log rotation.
name: kredar

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  traefik:
    restart: always
    command:
      - "--api.dashboard=false"
    logging: *default-logging

  postgres:
    restart: always
    logging: *default-logging

  kredar-api:
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G
