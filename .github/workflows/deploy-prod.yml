# Production deploy. Fired by an app repo on a push to main
# (repository_dispatch: deploy-prod), or manually. The 'production' GitHub
# Environment should be configured with REQUIRED REVIEWERS so this waits for
# manual approval before anything runs.
name: Deploy production

on:
  repository_dispatch:
    types: [deploy-prod]
  workflow_dispatch:
    inputs:
      service:
        description: app to release (kredar-backend); empty = redeploy current
        required: false
        default: ""
      sha:
        description: app image git SHA to pin
        required: false
        default: ""

jobs:
  deploy:
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      service: ${{ github.event.inputs.service || github.event.client_payload.service || '' }}
      sha: ${{ github.event.inputs.sha || github.event.client_payload.sha || '' }}
    secrets: inherit
